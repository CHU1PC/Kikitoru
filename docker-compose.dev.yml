services:
  db:
    image: postgres:18-alpine
    container_name: kikitoru-dev-db
    environment:
      POSTGRES_DB: kikitoru
      POSTGRES_USER: postgres
      # .env の POSTGRES_PASSWORD を読む。未設定なら dev_password にフォールバック。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      # ホスト側に 5432 を公開。alembic / psql / DataGrip 等から localhost:5432 で接続可能。
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: kikitoru-dev-backend
    depends_on:
      db:
        condition: service_healthy
    environment: &backend-env
      # glibc malloc arena 数を制限して RSS 単調増加を抑える
      MALLOC_ARENA_MAX: "2"
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-dev_password}@db:5432/kikitoru
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
      # AWS Transcribe / S3 (STT)。dev は IAM ロールが無いので開発者のローカルキーを使用する
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET in .env}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID in .env}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # OAuth (KKT/9 認証実装で使用)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      # Cookie / Session
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_EXPIRY_DAYS: ${SESSION_EXPIRY_DAYS:-1}
      # LLM / CORS
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:5173","http://localhost:8000"]}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
    ports:
      - "8000:8000"
    command: uv run fastapi dev main.py --host 0.0.0.0 --port 8000
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: sync
          path: ./backend/tests
          target: /app/tests
        - action: sync
          path: ./backend/alembic.ini
          target: /app/alembic.ini
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
        - action: rebuild
          path: ./backend/Dockerfile

  # STT ジョブを非同期処理する worker。backend と同じイメージ・env を共有し、
  # HTTP は公開しない (ポーリングループのみ)。コード変更は sync+restart で拾う。
  worker:
    build:
      context: ./backend
    container_name: kikitoru-dev-worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *backend-env
      PYTHONPATH: /app
    command: uv run app/worker.py
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
        - action: rebuild
          path: ./backend/Dockerfile

volumes:
  postgres_dev_data:
