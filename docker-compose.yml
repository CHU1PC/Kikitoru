services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kikitoru
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment: &backend-env
      # glibc malloc arena 数を制限して RSS 単調増加を抑える
      MALLOC_ARENA_MAX: "2"
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/kikitoru
      # AWS Transcribe / S3 (STT)
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      S3_BUCKET: ${S3_BUCKET}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      SESSION_EXPIRY_DAYS: ${SESSION_EXPIRY_DAYS:-1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:5173"]}
      RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-memory://}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
    ports:
      - "8000:8000"

  # STT ジョブを非同期処理する worker。backend と同じイメージ・env を共有し、HTTP は公開しない。
  worker:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *backend-env
      PYTHONPATH: /app
    command: uv run --no-sync app/worker.py
    restart: unless-stopped

volumes:
  postgres_data:
