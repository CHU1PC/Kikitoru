[project]
name = "kikitoru"
version = "0.1.0"
description = "AI-powered meeting minutes from voice recordings, with Japanese language support."
requires-python = ">=3.14"
dependencies = [
    "fastapi-cli>=0.0.24",
    "langchain>=1.2.16",
    "langchain-google-genai>=4.2.2",
    "pydantic>=2.13.3",
    "sqlmodel>=0.0.22",
    "psycopg[binary]>=3.2",
    "pgvector>=0.3",
    "alembic>=1.13",
    "pydantic-settings>=2.5",
    "python-dotenv>=1.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "ruff>=0.7",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812",
    "ISC001",
    "D100",
    "D104",
    "D203",
    "D213",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "D103", "ANN"]
"main.py" = ["D"]

[tool.ruff.lint.pydocstyle]
convention = "google"
